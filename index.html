<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pardon Laurine</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: linear-gradient(135deg, #ffe6f0, #fff3cd);
    font-family: "Comic Sans MS", "Segoe UI", sans-serif;
    padding: 24px;
    overflow-x: hidden;
  }
  h1 {
    font-size: 42px;
    color: #d6336c;
    margin-bottom: 4px;
    animation: wiggle 2s ease-in-out infinite;
  }
  .face {
    font-size: 90px;
    margin: 10px 0;
    display: inline-block;
    animation: bounce 1.4s ease-in-out infinite;
  }
  p.sub {
    font-size: 20px;
    color: #7a1f4b;
    max-width: 480px;
  }
  .excuse-box {
    margin-top: 20px;
    min-height: 60px;
    font-size: 18px;
    font-weight: bold;
    color: #a3145a;
    background: #fff;
    border: 3px dashed #ff8fab;
    border-radius: 16px;
    padding: 14px 20px;
    max-width: 460px;
  }
  button {
    margin: 10px 8px;
    padding: 14px 26px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    transition: transform 0.15s ease;
  }
  button:hover { transform: scale(1.08); }
  #excuseBtn { background: #ff6b9d; color: white; }
  #yesBtn { background: #57cc99; color: white; }
  #noBtn { background: #f94144; color: white; position: relative; }
  .confetti {
    position: fixed;
    top: -10px;
    font-size: 22px;
    animation: fall linear forwards;
    pointer-events: none;
  }
  #result {
    margin-top: 16px;
    font-size: 22px;
    font-weight: bold;
    color: #2b9348;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
  .shake { animation: shake 0.4s; }
</style>
</head>
<body>

  <h1>Pardon Laurine !</h1>
  <div class="face">🥺</div>
  <p class="sub">Je sais que j'ai fait une bêtise, est-ce que tu me pardonnes ?</p>

  <button id="excuseBtn" onclick="excuse()">Cliquer ici pour une excuse au hasard</button>
  <div class="excuse-box" id="excuseText">En attente d'une excuse crédible...</div>

  <div style="margin-top:30px;">
    <p class="sub" style="font-weight:bold;">Alors, tu me pardonnes ?</p>
    <button id="yesBtn" onclick="yes()">Oui, bon d'accord</button>
    <button id="noBtn" onclick="runAway(event)">Non</button>
  </div>

  <div id="result"></div>

<script>
  const excuses = [
    "C'était mon jumeau maléfique, je le jure.",
    "J'ai été kidnappé par des extraterrestres pendant 4 mois",
    "Mon chat a marché sur le clavier et a supprimer ton insta",
    "J'étais en plein rêve lucide, je pensais parler à Batman.",
    "Je testais si je te plaisais vraiment",
    "Un pigeon a distrait mon cerveau pendant 4 mois de trop.",
    "J'ai confondu 'envoyer' et supprimer insta",
    "Je m'entraînais pour un one-man-show sur les plus grosses erreurs de ma vie.",
  ];

  function excuse() {
    const box = document.getElementById("excuseText");
    box.textContent = excuses[Math.floor(Math.random() * excuses.length)];
    box.classList.remove("shake");
    void box.offsetWidth;
    box.classList.add("shake");
  }

  function yes() {
    document.getElementById("result").textContent = "Merci Laurine, tu es officiellement la meilleure. 🎉";
    for (let i = 0; i < 40; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.textContent = ["🎉","🎊","💐","✨"][Math.floor(Math.random()*4)];
      c.style.left = Math.random() * 100 + "vw";
      c.style.animationDuration = (2 + Math.random() * 2) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }

  let noClicks = 0;
  function runAway(e) {
    noClicks++;
    const btn = e.target;
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);
    btn.style.position = "fixed";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
    const msgs = [
      "Reviens là !",
      "Tu ne peux pas fuir...",
      "J'ai plus d'excuses, promis !",
      "Ok j'arrête, tu as gagné.",
      "Dernier essai promis..."
    ];
    document.getElementById("result").textContent = msgs[Math.min(noClicks - 1, msgs.length - 1)];
    if (noClicks >= msgs.length) {
      btn.style.display = "none";
    }
  }
</script>

</body>
</html>
